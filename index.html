<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#E85D20">
<meta name="referrer" content="no-referrer">
<title>图片标注大师 · 法律文档</title>
<style>
:root { --fg:#1d1d1f; --fg-muted:#6e6e73; --bg:#fff; --accent:#E85D20;
        --rule:#d2d2d7; --code-bg:#f5f5f7; }
* { box-sizing:border-box; }
html { -webkit-text-size-adjust:100%; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Helvetica Neue",Arial,sans-serif;
       font-size:16px; line-height:1.7; color:var(--fg); background:var(--bg); -webkit-font-smoothing:antialiased; }
.container { max-width:720px; margin:0 auto; padding:48px 24px 96px; }
h1 { font-size:28px; font-weight:700; margin:0 0 8px; line-height:1.3; }
h2 { font-size:22px; font-weight:700; margin:40px 0 12px; padding-top:16px; border-top:1px solid var(--rule); }
h3 { font-size:18px; font-weight:600; margin:28px 0 10px; }
h4 { font-size:16px; font-weight:600; margin:20px 0 8px; }
p { margin:0 0 14px; }
ul,ol { padding-left:22px; margin:0 0 14px; }
li { margin-bottom:6px; }
strong { font-weight:600; }
hr { border:none; border-top:1px solid var(--rule); margin:32px 0; }
a { color:var(--accent); text-decoration:none; }
a:hover { text-decoration:underline; }
code { background:var(--code-bg); padding:2px 6px; border-radius:4px;
       font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:0.9em; }
pre { background:var(--code-bg); padding:14px 16px; border-radius:8px; overflow-x:auto; }
pre code { background:transparent; padding:0; }
blockquote { border-left:3px solid var(--accent); margin:16px 0; padding:4px 16px;
             color:var(--fg-muted); background:var(--code-bg); border-radius:0 6px 6px 0; }
blockquote p:last-child { margin-bottom:0; }
table { border-collapse:collapse; width:100%; margin:16px 0; font-size:14px; }
th,td { border:1px solid var(--rule); padding:10px 12px; text-align:left; vertical-align:top; }
th { background:var(--code-bg); font-weight:600; }
.meta { color:var(--fg-muted); font-size:14px; margin-bottom:32px; }
.footer { margin-top:64px; padding-top:24px; border-top:1px solid var(--rule);
          color:var(--fg-muted); font-size:13px; text-align:center; }
@media (prefers-color-scheme: dark) {
  :root { --fg:#f5f5f7; --fg-muted:#a1a1a6; --bg:#1a1a1f;
          --rule:#38383d; --code-bg:#2a2a2f; --accent:#ff8a4c; }
}
</style>
</head>
<body>
<div class="container">
<h1>图片标注大师</h1>
<p class="meta">法律文档</p>
<ul>

  <li><a href="./terms.html">用户协议</a></li>
</ul>
<div class="footer">
  © 2026 林伟浩 · <a href="./index.html">返回</a>
</div>
</div>
</body>
</html>
